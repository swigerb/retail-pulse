<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Retail Pulse logo — stylized bar chart with pulse line -->
  <!-- Chart bars -->
  <rect x="5" y="18" width="4" height="10" rx="1" fill="#1B4D7A"/>
  <rect x="11" y="12" width="4" height="16" rx="1" fill="#1B4D7A"/>
  <rect x="17" y="8" width="4" height="20" rx="1" fill="#E8A838"/>
  <rect x="23" y="14" width="4" height="14" rx="1" fill="#1B4D7A"/>
  <!-- Pulse line -->
  <polyline points="3,16 9,14 15,10 21,6 29,12" fill="none" stroke="#E8A838" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Dot on peak -->
  <circle cx="21" cy="6" r="2" fill="#E8A838"/>
</svg>