<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Stylized bee/hornet inspired by Patrón's logo -->
  <!-- Body -->
  <ellipse cx="16" cy="18" rx="6" ry="8" fill="#C8A951"/>
  <!-- Stripes -->
  <rect x="10" y="15" width="12" height="2" rx="1" fill="#393939"/>
  <rect x="10" y="19" width="12" height="2" rx="1" fill="#393939"/>
  <!-- Wings -->
  <ellipse cx="10" cy="13" rx="4" ry="6" fill="#C8A951" opacity="0.5" transform="rotate(-20 10 13)"/>
  <ellipse cx="22" cy="13" rx="4" ry="6" fill="#C8A951" opacity="0.5" transform="rotate(20 22 13)"/>
  <!-- Head -->
  <circle cx="16" cy="9" r="3.5" fill="#C8A951"/>
  <!-- Eyes -->
  <circle cx="14.5" cy="8.5" r="0.8" fill="#393939"/>
  <circle cx="17.5" cy="8.5" r="0.8" fill="#393939"/>
  <!-- Antennae -->
  <line x1="14" y1="6" x2="12" y2="3" stroke="#C8A951" stroke-width="1" stroke-linecap="round"/>
  <line x1="18" y1="6" x2="20" y2="3" stroke="#C8A951" stroke-width="1" stroke-linecap="round"/>
  <!-- Stinger -->
  <polygon points="16,26 14.5,23 17.5,23" fill="#C8A951"/>
</svg>