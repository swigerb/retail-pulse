<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Azure Production</title>
<style>* { margin:0; padding:0; box-sizing:border-box; } body { background:#fff; }</style>
</head>
<body>
<svg viewBox="0 0 700 340" xmlns="http://www.w3.org/2000/svg" style="width:1400px;height:680px;display:block;">
  <defs>
    <filter id="ds" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
    <marker id="ah" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#868e96"/>
    </marker>
  </defs>

  <rect width="700" height="340" fill="#fff"/>

  <!-- Title -->
  <text x="24" y="28" font-size="18" font-weight="700" fill="#1e1e1e" font-family="Segoe UI, sans-serif">Azure Production (Target)</text>
  <text x="24" y="44" font-size="10" fill="#6b7280" font-family="Segoe UI, sans-serif">Container Apps with managed services for observability and security</text>

  <!-- Outer container -->
  <rect x="24" y="56" width="652" height="274" rx="10" fill="#F0F9FF" stroke="#0078D4" stroke-width="1.5" filter="url(#ds)"/>
  <text x="40" y="74" font-size="11" font-weight="700" fill="#0078D4" font-family="Segoe UI, sans-serif">Azure Container Apps Environment</text>

  <!-- Layout: 3 columns, rows at y=88, y=154, y=220 -->
  <!-- Col 1: x=40, w=178 -->
  <!-- Col 2: x=248, w=196 -->
  <!-- Col 3: x=474, w=186 -->

  <!-- === DASHED TELEMETRY LINES (drawn first, behind boxes) === -->

  <!-- Api telemetry: down from Api bottom-center, along bus below Web, up to Monitor bottom -->
  <path d="M 148 140 L 148 284 L 346 284 L 346 206"
        fill="none" stroke="#10b981" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.7"/>

  <!-- McpServer telemetry: straight right to Monitor left edge -->
  <path d="M 218 180 L 248 180"
        fill="none" stroke="#10b981" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.7"/>

  <!-- Web telemetry: right from Web, then up to Monitor bottom -->
  <path d="M 218 246 L 316 246 L 316 206"
        fill="none" stroke="#10b981" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.7"/>

  <!-- OTLP label -->
  <text x="354" y="278" font-size="9" fill="#10b981" font-family="Segoe UI, sans-serif">OTLP</text>

  <!-- === SOLID ARROWS === -->
  <!-- Api -> APIM -->
  <line x1="218" y1="114" x2="244" y2="114" stroke="#868e96" stroke-width="2" marker-end="url(#ah)"/>
  <!-- APIM -> AI Foundry -->
  <line x1="444" y1="114" x2="470" y2="114" stroke="#868e96" stroke-width="2" marker-end="url(#ah)"/>

  <!-- === BOXES (on top) === -->

  <!-- Col 1: App Services -->
  <rect x="40" y="88" width="178" height="52" rx="8" fill="#CFE4FA" stroke="#0078D4" stroke-width="1.2" filter="url(#ds)"/>
  <text x="54" y="110" font-size="12" font-weight="600" fill="#1e1e1e" font-family="Cascadia Mono, Consolas, monospace">Api</text>
  <text x="54" y="128" font-size="10" fill="#6b7280" font-family="Segoe UI, sans-serif">Container App</text>

  <rect x="40" y="154" width="178" height="52" rx="8" fill="#FFF4CE" stroke="#F7630C" stroke-width="1.2" filter="url(#ds)"/>
  <text x="54" y="176" font-size="12" font-weight="600" fill="#1e1e1e" font-family="Cascadia Mono, Consolas, monospace">McpServer</text>
  <text x="54" y="194" font-size="10" fill="#6b7280" font-family="Segoe UI, sans-serif">Container App</text>

  <rect x="40" y="220" width="178" height="52" rx="8" fill="#E8DAEF" stroke="#5C2D91" stroke-width="1.2" filter="url(#ds)"/>
  <text x="54" y="242" font-size="12" font-weight="600" fill="#1e1e1e" font-family="Cascadia Mono, Consolas, monospace">Web</text>
  <text x="54" y="260" font-size="10" fill="#6b7280" font-family="Segoe UI, sans-serif">Static Web App</text>

  <!-- Col 2: Gateway + Monitor -->
  <rect x="248" y="88" width="196" height="52" rx="8" fill="#FDE7E9" stroke="#D13438" stroke-width="1.2" filter="url(#ds)"/>
  <text x="262" y="110" font-size="12" font-weight="600" fill="#1e1e1e" font-family="Cascadia Mono, Consolas, monospace">API Management</text>
  <text x="262" y="128" font-size="10" fill="#6b7280" font-family="Segoe UI, sans-serif">AI Gateway + Policies</text>

  <rect x="248" y="154" width="196" height="52" rx="8" fill="#DFF6DD" stroke="#107C10" stroke-width="1.2" filter="url(#ds)"/>
  <text x="262" y="176" font-size="12" font-weight="600" fill="#1e1e1e" font-family="Cascadia Mono, Consolas, monospace">Azure Monitor</text>
  <text x="262" y="194" font-size="10" fill="#6b7280" font-family="Segoe UI, sans-serif">App Insights + OTLP</text>

  <!-- Col 3: Foundry + Key Vault -->
  <rect x="474" y="88" width="186" height="52" rx="8" fill="#DFF6DD" stroke="#107C10" stroke-width="1.2" filter="url(#ds)"/>
  <text x="488" y="110" font-size="12" font-weight="600" fill="#1e1e1e" font-family="Cascadia Mono, Consolas, monospace">AI Foundry</text>
  <text x="488" y="128" font-size="10" fill="#6b7280" font-family="Segoe UI, sans-serif">GPT-5.4-mini</text>

  <rect x="474" y="154" width="186" height="52" rx="8" fill="#fff3bf" stroke="#e67700" stroke-width="1.2" filter="url(#ds)"/>
  <text x="488" y="176" font-size="12" font-weight="600" fill="#1e1e1e" font-family="Cascadia Mono, Consolas, monospace">Key Vault</text>
  <text x="488" y="194" font-size="10" fill="#6b7280" font-family="Segoe UI, sans-serif">Keys + Conn Strings</text>

</svg>
</body>
</html>
