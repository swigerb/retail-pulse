<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Local Development</title>
<style>* { margin:0; padding:0; box-sizing:border-box; } body { background:#fff; }</style>
</head>
<body>
<svg viewBox="0 0 520 300" xmlns="http://www.w3.org/2000/svg" style="width:1040px;height:600px;display:block;">
  <defs>
    <filter id="ds" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="520" height="300" fill="#fff"/>

  <!-- Title -->
  <text x="24" y="28" font-size="18" font-weight="700" fill="#1e1e1e" font-family="Segoe UI, sans-serif">Local Development</text>
  <text x="24" y="44" font-size="10" fill="#6b7280" font-family="Segoe UI, sans-serif">Single command launches all services via .NET Aspire</text>

  <!-- Command bar -->
  <rect x="24" y="56" width="472" height="26" rx="5" fill="#1e1e1e"/>
  <text x="36" y="73" font-size="11" fill="#4ade80" font-family="Cascadia Mono, Consolas, monospace">$ dotnet run --project src/RetailPulse.AppHost</text>

  <!-- Aspire AppHost container -->
  <rect x="24" y="94" width="472" height="194" rx="10" fill="#F0F9FF" stroke="#0078D4" stroke-width="1.5" filter="url(#ds)"/>
  <text x="40" y="114" font-size="11" font-weight="700" fill="#0078D4" font-family="Segoe UI, sans-serif">Aspire AppHost (Orchestrator)</text>

  <!-- Row 1 -->
  <!-- RetailPulse.Api -->
  <rect x="40" y="126" width="210" height="58" rx="8" fill="#CFE4FA" stroke="#0078D4" stroke-width="1.2" filter="url(#ds)"/>
  <text x="54" y="150" font-size="12" font-weight="600" fill="#1e1e1e" font-family="Cascadia Mono, Consolas, monospace">RetailPulse.Api</text>
  <text x="54" y="168" font-size="10" fill="#6b7280" font-family="Segoe UI, sans-serif">:5100  Agent + SignalR</text>

  <!-- McpServer -->
  <rect x="266" y="126" width="210" height="58" rx="8" fill="#FFF4CE" stroke="#F7630C" stroke-width="1.2" filter="url(#ds)"/>
  <text x="280" y="150" font-size="12" font-weight="600" fill="#1e1e1e" font-family="Cascadia Mono, Consolas, monospace">McpServer</text>
  <text x="280" y="168" font-size="10" fill="#6b7280" font-family="Segoe UI, sans-serif">:5200  MCP Tools + Data</text>

  <!-- Row 2 -->
  <!-- RetailPulse.Web -->
  <rect x="40" y="200" width="210" height="58" rx="8" fill="#E8DAEF" stroke="#5C2D91" stroke-width="1.2" filter="url(#ds)"/>
  <text x="54" y="224" font-size="12" font-weight="600" fill="#1e1e1e" font-family="Cascadia Mono, Consolas, monospace">RetailPulse.Web</text>
  <text x="54" y="242" font-size="10" fill="#6b7280" font-family="Segoe UI, sans-serif">:5173  React Frontend</text>

  <!-- Aspire Dashboard -->
  <rect x="266" y="200" width="210" height="58" rx="8" fill="#DFF6DD" stroke="#107C10" stroke-width="1.2" filter="url(#ds)"/>
  <text x="280" y="224" font-size="12" font-weight="600" fill="#1e1e1e" font-family="Cascadia Mono, Consolas, monospace">Aspire Dashboard</text>
  <text x="280" y="242" font-size="10" fill="#6b7280" font-family="Segoe UI, sans-serif">Auto-port  Traces + Logs</text>

</svg>
</body>
</html>
